<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Limelight Displayer</title>
        <style>
            img.Lime {
                background-color:gray; font: 100px white monospace;
                display:block; position: absolute; width:100%; height:50%; left:0;
                object-fit:contain;
            }
        </style>
    </head>
    <body>
        <img class="Lime" id="lime 1" style="top:0" onclick="setSource(1,prompt('Upper Port (11?)',11))">
        <img class="Lime" id="lime 2" style="top:50%" onclick="setSource(2,prompt('Lower Port (12?)',12))">
    </body>
    <script>
        function setSource(n,port){
            document.getElementById("lime "+n).src = `http://10.71.95.${port}:5800/`
        }
        setSource(1,11)
        setSource(2,12)
    </script>
</html>
